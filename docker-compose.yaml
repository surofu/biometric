services:
  db:
    image: postgres:17-alpine
    container_name: biometric-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: biometric
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/postgres.conf:/etc/postgresql/postgresql.conf
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biometric"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: biometric-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=biometric
      - GOOGLE_OAUTH_CLIENT_ID=google_oauth_client_id
      - GOOGLE_OAUTH_CLIENT_SECRET=google_oauth_client_secret
      - GOOGLE_OAUTH_REFRESH_TOKEN=google_oauth_refresh_token
      - BASE_URL=http://localhost:8080
      - REMEMBER_ME_KEY=random_string
      - RESEND_API_KEY=resend_api_key
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge